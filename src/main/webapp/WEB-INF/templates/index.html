<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Weather Viewer – Homepage</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar navbar-light bg-light">
    <div class="container-fluid"><a class="navbar-brand" href="#"> <img src="/images/weather-app.png" alt="" width="30"
                                                                        height="24"
                                                                        class="d-inline-block align-text-top"> Weather
        Tracker </a>
        <div class="d-flex align-items-center"><span class="navbar-text me-3" th:text="${currentUser.login}"></span>
            <form th:action="@{/auth/logout}" method="post">
                <button type="submit" class="btn btn-outline-danger">Sign out</button>
            </form>
        </div>
    </div>
</nav>
<section id="page-content">
    <div class="container mt-4">
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
        <div class="d-flex my-4">
            <form th:action="@{/locations/search}" method="get" class="d-flex w-100">
                <div class="input-group location-search-input-group me-3"><label> <input type="text"
                                                                                         class="form-control"
                                                                                         name="query"
                                                                                         placeholder="Enter location"
                                                                                         required> </label>
                    <button class="btn btn-outline-secondary btn-sm clear-input-button" type="button"
                            onclick="this.parentElement.querySelector('input').value=''">&times;
                    </button>
                </div>
                <button type="submit" class="btn btn-outline-success">Search</button>
            </form>
        </div>
        <div><h2>Your Locations:</h2>
            <div class="row" th:if="${weatherCards != null && !#lists.isEmpty(weatherCards)}">
                <div class="col-12 col-lg-3 col-md-6 mb-4" th:each="card : ${weatherCards}">
                    <div class="card h-100 position-relative weather-card">
                        <div class="position-absolute weather-card-delete-form">
                            <form th:action="@{/locations/delete/{id}(id=${card.locationId})}" method="post">
                                <button type="submit" class="btn-close" aria-label="Delete"></button>
                            </form>
                        </div>
                        <img class="card-img-top img-fluid"
                             th:src="'https://openweathermap.org/img/wn/' + ${card.icon} + '@4x.png'"
                             alt="Weather icon">
                        <div class="card-body d-flex flex-column"><h1 class="card-text"
                                                                      th:text="${#numbers.formatDecimal(card.temperature, 1, 0)} + '°C'"></h1>
                            <h3 class="card-title" th:text="${card.name} + ', ' + ${card.country}"></h3>
                            <p class="card-text mb-1">Feels like <span th:text="${card.feelsLike} + '°C'"></span>. <span
                                    th:text="${card.weatherDescription}"></span></p>
                            <p class="card-text mb-1">Humidity: <span th:text="${card.humidity} + '%'"></span></p></div>
                    </div>
                </div>
            </div>
            <div th:if="${weatherCards == null || #lists.isEmpty(weatherCards)}" class="alert alert-info"> No locations
                added yet. Use the search above to add your first location.
            </div>
        </div>
    </div>
</section>
<footer class="d-flex flex-wrap justify-content-between align-items-center py-3 mt-4 border-top">
    <div class="px-4"><span>© Weather Viewer, project from <a
            href="https://zhukovsd.github.io/java-backend-learning-course/">zhukovsd/java-backend-learning-course</a> roadmap.</span>
    </div>
</footer>
</body>
</html>
