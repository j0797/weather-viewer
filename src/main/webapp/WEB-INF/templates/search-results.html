<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Search Results – Weather Viewer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar navbar-light bg-light">
    <div class="container-fluid"><a class="navbar-brand" href="/"> <img src="/images/weather-app.png" alt="" width="30"
                                                                        height="24"
                                                                        class="d-inline-block align-text-top"> Weather
        Tracker </a>
        <div class="d-flex align-items-center"><span class="navbar-text me-3" th:text="${currentUser.login}"></span>
            <form th:action="@{/auth/logout}" method="post">
                <button type="submit" class="btn btn-outline-danger">Sign out</button>
            </form>
        </div>
    </div>
</nav>
<section id="page-content">
    <div class="container mt-4">
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
        <div class="d-flex my-4">
            <form th:action="@{/locations/search}" method="get" class="d-flex w-100">
                <div class="input-group location-search-input-group me-3"><label> <input type="text"
                                                                                         class="form-control"
                                                                                         name="query"
                                                                                         th:value="${query}"
                                                                                         placeholder="Enter location"
                                                                                         required> </label>
                    <button class="btn btn-outline-secondary btn-sm clear-input-button" type="button"
                            onclick="this.parentElement.querySelector('input').value=''">&times;
                    </button>
                </div>
                <button type="submit" class="btn btn-outline-success">Search</button>
            </form>
        </div>
        <div><h2>Search Results for "<span th:text="${query}"></span>"</h2>
            <div th:if="${locations != null && !#lists.isEmpty(locations)}">
                <div class="row">
                    <div class="col-12 col-lg-4 col-md-6 mb-4" th:each="loc : ${locations}">
                        <div class="card h-100">
                            <div class="card-body d-flex flex-column"><h5 class="card-title"
                                                                          th:text="${loc.name} + ', ' + ${loc.country}"></h5>
                                <p class="card-text" th:text="'Latitude: ' + ${loc.lat}"></p>
                                <p class="card-text" th:text="'Longitude: ' + ${loc.lon}"></p>
                                <p class="card-text" th:text="'State: ' + (${loc.state} ?: 'N/A')"></p>
                                <div class="mt-auto">
                                    <th:block th:if="${!existingNames.contains(loc.name.toLowerCase())}">
                                        <form th:action="@{/locations/add}" method="post"><input type="hidden"
                                                                                                 name="name"
                                                                                                 th:value="${loc.name}">
                                            <input type="hidden" name="lat" th:value="${loc.lat}"> <input type="hidden"
                                                                                                          name="lon"
                                                                                                          th:value="${loc.lon}">
                                            <button type="submit" class="btn btn-primary w-100">Add</button>
                                        </form>
                                    </th:block>
                                    <th:block th:if="${existingNames.contains(loc.name.toLowerCase())}"><span
                                            class="badge bg-success w-100 py-2">Already added</span></th:block>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div th:if="${locations == null || #lists.isEmpty(locations)}" class="alert alert-info"> No locations found
                for "<span th:text="${query}"></span>".
            </div>
        </div>
    </div>
</section>
<footer class="d-flex flex-wrap justify-content-between align-items-center py-3 mt-4 border-top">
    <div class="px-4"><span>© Weather Viewer</span></div>
</footer>
</body>
</html>
